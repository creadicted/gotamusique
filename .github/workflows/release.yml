name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go vet ./...
      - run: go test ./...

      - name: Build binary
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -o gotamusique-linux-amd64 ./cmd/gotamusique

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: gotamusique-linux-amd64
